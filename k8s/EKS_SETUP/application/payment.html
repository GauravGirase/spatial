<!DOCTYPE html>
<html>
<head>
<title>Payment Service</title>
<style>
body {
  margin:0;
  font-family: Arial;
  background:#dcfce7;
}
.container {
  padding:80px;
  text-align:center;
}
.card {
  background:white;
  padding:30px;
  border-radius:12px;
  display:inline-block;
  box-shadow:0 4px 15px rgba(0,0,0,0.1);
}
input {
  width:80%;
  padding:10px;
  margin:10px 0;
  border:1px solid #ccc;
  border-radius:6px;
}
button {
  background:#16a34a;
  color:white;
  border:none;
  padding:12px 20px;
  border-radius:6px;
  cursor:pointer;
}
</style>
</head>
<body>
<div class="container">
  <div class="card">
    <h1>💳 Payment Service</h1>
    <p>Ingress Route: /payment</p>
    <input type="text" placeholder="Card Number">
    <input type="text" placeholder="Expiry Date">
    <input type="text" placeholder="CVV">
    <br>
    <button>Pay $999</button>
  </div>
</div>
</body>
</html>
