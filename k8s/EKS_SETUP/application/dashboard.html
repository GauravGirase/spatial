<!DOCTYPE html>
<html>
<head>
<title>Dashboard Service</title>
<style>
body {
  margin:0;
  font-family: Arial;
  background:#f4f6f9;
}
.header {
  background:#1e293b;
  color:white;
  padding:20px;
  text-align:center;
}
.container {
  padding:40px;
  display:flex;
  gap:20px;
}
.card {
  flex:1;
  background:white;
  padding:20px;
  border-radius:10px;
  box-shadow:0 4px 10px rgba(0,0,0,0.1);
  text-align:center;
}
h2 { margin:0 0 10px 0; }
</style>
</head>
<body>
<div class="header">
  <h1>📊 Dashboard Service</h1>
  <p>Ingress Route: /dashboard</p>
</div>
<div class="container">
  <div class="card">
    <h2>Total Orders</h2>
    <p>25</p>
  </div>
  <div class="card">
    <h2>Total Revenue</h2>
    <p>$12,540</p>
  </div>
  <div class="card">
    <h2>Pending</h2>
    <p>3 Orders</p>
  </div>
</div>
</body>
</html>
