<!DOCTYPE html>
<html>
<head>
<title>Checkout Service</title>
<style>
body {
  margin:0;
  font-family: Arial;
  background:#fef3c7;
}
.container {
  padding:80px;
  text-align:center;
}
.card {
  background:white;
  padding:30px;
  border-radius:12px;
  display:inline-block;
  box-shadow:0 4px 15px rgba(0,0,0,0.1);
}
button {
  background:#f59e0b;
  color:white;
  border:none;
  padding:12px 20px;
  border-radius:6px;
  cursor:pointer;
}
</style>
</head>
<body>
<div class="container">
  <div class="card">
    <h1>🛒 Checkout Service</h1>
    <p>Product: iPhone 15</p>
    <p>Price: $999</p>
    <p><strong>Total: $999</strong></p>
    <p>Ingress Route: /checkout</p>
    <button>Proceed to Payment</button>
  </div>
</div>
</body>
</html>
